[build]
# Explicit default target avoids implicit platform differences between dev machines.
# Override per-project if targeting a different platform (e.g. aarch64-unknown-linux-gnu).
target = "x86_64-unknown-linux-gnu"

[net]
# Sparse protocol avoids downloading the full index git history on every resolve.
# Stable since Rust 1.68; substantially faster on cold CI caches.
git-fetch-with-cli = false

[registries.crates-io]
protocol = "sparse"

[alias]
# Short aliases for the most frequent cargo invocations.
t = "test"
c = "clippy -- -D warnings"
f = "fmt --all"
