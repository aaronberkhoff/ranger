# Builds the PyO3 extension, generates .pyi stubs, and runs Pyright.
# Synced from aaronberkhoff/gambit-rust-template. Do not edit manually.
name: Type check

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1

jobs:
    pyright:
        name: Pyright
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v6

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            # Separate cache key: maturin produces cdylib artifacts that differ
            # from the rlib artifacts produced by plain cargo test.
            - name: Cache Rust dependencies
              uses: Swatinem/rust-cache@v2
              with:
                  key: python

            - name: Install uv
              uses: astral-sh/setup-uv@v7

            - name: Install Python dev dependencies
              run: uv sync --group dev

            - name: Build and install extension
              run: uv run maturin develop

            - name: Generate stubs
              # Produces up-to-date .pyi files so Pyright can type-check
              # callers of the extension without relying on committed stubs.
              run: cargo run --bin stub_gen

            - name: Run Pyright
              run: uv run pyright
