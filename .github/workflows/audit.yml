# Security audit via cargo-audit against the RustSec Advisory Database.
# Synced from aaronberkhoff/gambit-rust-template. Do not edit manually.
name: Security audit

on:
    # Run weekly — advisories are published continuously so daily would be noisy.
    schedule:
        - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
    # Allow manual runs when you want an immediate check.
    workflow_dispatch:

jobs:
    audit:
        name: cargo audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Run cargo audit
              uses: rustsec/audit-check@v1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
