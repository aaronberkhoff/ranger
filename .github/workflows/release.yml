# Release workflow: validates version consistency, builds binaries for all supported
# targets, generates SHA256 checksums, and publishes a GitHub release.
# Synced from aaronberkhoff/gambit-rust-template. Do not edit manually.
name: Release

on:
    push:
        tags:
            - "v*.*.*"

env:
    CARGO_TERM_COLOR: always

jobs:
    validate-version:
        name: Validate tag vs Cargo.toml version
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6

            - name: Check tag matches Cargo.toml version
              run: |
                  CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
                  TAG_VERSION="${GITHUB_REF_NAME#v}"

                  echo "Cargo.toml version: $CARGO_VERSION"
                  echo "Git tag version:    $TAG_VERSION"

                  if [[ "$CARGO_VERSION" != "$TAG_VERSION" ]]; then
                      echo "::error::Version mismatch: Cargo.toml has $CARGO_VERSION but tag is v$TAG_VERSION"
                      echo "::error::Update Cargo.toml version before pushing a release tag."
                      exit 1
                  fi

    build:
        name: Build — ${{ matrix.target }}
        needs: validate-version
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 30
        strategy:
            # Allow other targets to finish even if one fails.
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-gnu
                      runner: ubuntu-latest
                      use-cross: false

                    # Linux aarch64 requires cross-compilation on hosted x86_64 runners.
                    - target: aarch64-unknown-linux-gnu
                      runner: ubuntu-latest
                      use-cross: true

                    # macos-latest is now arm64 (M1); use macos-13 for x86_64.
                    - target: x86_64-apple-darwin
                      runner: macos-13
                      use-cross: false

                    - target: aarch64-apple-darwin
                      runner: macos-latest
                      use-cross: false

                    - target: x86_64-pc-windows-msvc
                      runner: windows-latest
                      use-cross: false

        steps:
            - uses: actions/checkout@v6

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache dependencies
              uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Install cross (aarch64-linux only)
              if: matrix.use-cross
              run: cargo install cross --git https://github.com/cross-rs/cross

            - name: Build release binary
              shell: bash
              run: |
                  if [[ "${{ matrix.use-cross }}" == "true" ]]; then
                      cross build --release --target ${{ matrix.target }} --all-features
                  else
                      cargo build --release --target ${{ matrix.target }} --all-features
                  fi

            - name: Rename binary for upload
              id: binary
              shell: bash
              run: |
                  BIN="${{ github.event.repository.name }}"
                  TARGET="${{ matrix.target }}"
                  if [[ "$TARGET" == *"windows"* ]]; then
                      DEST="${BIN}-${TARGET}.exe"
                      cp "target/${TARGET}/release/${BIN}.exe" "$DEST"
                  else
                      DEST="${BIN}-${TARGET}"
                      cp "target/${TARGET}/release/${BIN}" "$DEST"
                  fi
                  echo "dest=$DEST" >> "$GITHUB_OUTPUT"

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: binary-${{ matrix.target }}
                  path: ${{ steps.binary.outputs.dest }}
                  # Fail loudly if the binary is missing rather than silently
                  # creating an empty release.
                  if-no-files-found: error

    create-release:
        name: Create GitHub release
        runs-on: ubuntu-latest
        needs: build
        timeout-minutes: 15
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6

            - name: Download all build artifacts
              uses: actions/download-artifact@v4
              with:
                  # Collect every binary-* artifact into a flat dist/ directory.
                  pattern: binary-*
                  path: dist/
                  merge-multiple: true

            - name: Generate SHA256 checksums
              working-directory: dist/
              run: |
                  sha256sum * > SHA256SUMS.txt
                  cat SHA256SUMS.txt

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  # Pulls release notes from merged PRs and commits since the last tag.
                  generate_release_notes: true
                  files: dist/*

    # Uncomment to publish to crates.io.
    # Requires CARGO_REGISTRY_TOKEN secret set in repo settings.
