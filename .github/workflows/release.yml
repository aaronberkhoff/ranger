# Release workflow: triggered by version tags (e.g. v1.2.3).
# Builds a release binary, creates a GitHub release with auto-generated notes,
# and optionally publishes to crates.io (commented out by default).
# Synced from aaronberkhoff/gambit-rust-template. Do not edit manually.
name: Release

on:
    push:
        tags:
            - "v*.*.*"

env:
    CARGO_TERM_COLOR: always

jobs:
    build-release:
        name: Build release binary
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Cache dependencies
              uses: Swatinem/rust-cache@v2

            - name: Build release
              run: cargo build --release --all-features

            - name: Upload binary artifact
              uses: actions/upload-artifact@v4
              with:
                  name: release-binary
                  # Adjust the binary name to match your project's [[bin]] target.
                  path: target/release/${{ github.event.repository.name }}
                  if-no-files-found: warn

    create-release:
        name: Create GitHub release
        runs-on: ubuntu-latest
        needs: build-release
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v5

            - name: Download binary artifact
              uses: actions/download-artifact@v4
              with:
                  name: release-binary
                  path: dist/

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  # generate_release_notes pulls from merged PRs and commit messages
                  # between this tag and the previous one — no CHANGELOG maintenance needed.
                  generate_release_notes: true
                  files: dist/*

    # Uncomment to publish to crates.io.
    # Requires CARGO_REGISTRY_TOKEN secret set in repo settings.
