# Builds Python wheels for all supported platforms and publishes to PyPI.
# Synced from aaronberkhoff/gambit-rust-template. Do not edit manually.
#
# Prerequisites (one-time setup per repo):
#   1. Create a PyPI API token and add it as secret PYPI_API_TOKEN in repo settings.
#   2. Alternatively, configure Trusted Publishing in PyPI project settings to avoid
#      storing a long-lived token (see https://docs.pypi.org/trusted-publishers/).
name: Publish to PyPI

on:
    push:
        tags:
            - "v*.*.*"

env:
    CARGO_TERM_COLOR: always

jobs:
    build-wheels:
        name: Build wheels — ${{ matrix.target }}
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64
                      runner: ubuntu-latest

                    - target: aarch64
                      runner: ubuntu-latest

                    - target: x86_64
                      runner: windows-latest

                    - target: aarch64
                      runner: macos-latest

                    - target: x86_64
                      runner: macos-13

        steps:
            - uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7

            - name: Build wheels
              uses: PyO3/maturin-action@v1
              with:
                  target: ${{ matrix.target }}
                  # bundled-musllinux ships musl libc inside the wheel so it
                  # runs on any Linux without a system musl install.
                  manylinux: auto
                  args: --release --out dist --find-interpreter
                  sccache: true

            - name: Upload wheels
              uses: actions/upload-artifact@v7
              with:
                  name: wheels-${{ matrix.runner }}-${{ matrix.target }}
                  path: dist/
                  if-no-files-found: error

    build-sdist:
        name: Build source distribution
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - name: Build sdist
              uses: PyO3/maturin-action@v1
              with:
                  command: sdist
                  args: --out dist

            - name: Upload sdist
              uses: actions/upload-artifact@v7
              with:
                  name: sdist
                  path: dist/
                  if-no-files-found: error

    publish:
        name: Publish to PyPI
        runs-on: ubuntu-latest
        needs: [build-wheels, build-sdist]
        timeout-minutes: 15
        environment:
            name: pypi
            url: https://pypi.org/p/{{project_name}}
        permissions:
            # Required for PyPI Trusted Publishing (OIDC).
            id-token: write
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v8
              with:
                  pattern: "wheels-*"
                  path: dist/
                  merge-multiple: true

            - name: Download sdist
              uses: actions/download-artifact@v8
              with:
                  name: sdist
                  path: dist/

            - name: Publish to PyPI
              uses: PyO3/maturin-action@v1
              with:
                  command: upload
                  args: --non-interactive --skip-existing dist/*
              env:
                  # Remove this block if using Trusted Publishing instead of a token.
                  MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
