# Synced from aaronberkhoff/gambit-rust-template. Do not edit manually.
name: Rustfmt

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1

jobs:
    fmt:
        name: Rustfmt
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v6

            - name: Install Rust toolchain (with rustfmt)
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt

            # --check exits non-zero if any file would be reformatted.
            - name: Check formatting
              run: cargo fmt --all -- --check
