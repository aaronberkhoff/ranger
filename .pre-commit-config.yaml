# Pre-commit hooks for Rust + Python (PyO3/maturin) projects.
# Install once per clone: uv run pre-commit install
# Run manually against all files: uv run pre-commit run --all-files
# Update hook versions: uv run pre-commit autoupdate
repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
          - id: check-toml
          - id: check-json
          - id: check-merge-conflict
          - id: check-case-conflict
          - id: check-added-large-files
          - id: detect-private-key
          - id: no-commit-to-branch
            args: [--branch, main]

    # Spell-checker — matches the spell-check.yml CI workflow.
    - repo: https://github.com/crate-ci/typos
      rev: v1
      hooks:
          - id: typos

    # Python formatter (Black-compatible, replaces black).
    # Python linter — fixes safe issues automatically, flags the rest.
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.9.0
      hooks:
          - id: ruff-format
          - id: ruff
            args: [--fix]

    # Markdown formatter — uses the same plugins as the docs build.
    - repo: https://github.com/hukkin/mdformat
      rev: 0.7.19
      hooks:
          - id: mdformat
            additional_dependencies:
                - mdformat-mkdocs>=2.0.4
                - mdformat-admon>=2.0.2

    # Rust and Python hooks run against the local toolchain (no network required).
    - repo: local
      hooks:
          # Auto-formats all changed Rust files.
          - id: cargo-fmt
            name: cargo fmt
            entry: cargo fmt --
            language: system
            types: [rust]
            pass_filenames: true

          # Lints all targets when any Rust file changes. Remove this hook
          # and rely on CI instead if compile times make it too slow locally.
          - id: cargo-clippy
            name: cargo clippy
            entry: cargo clippy --all-targets -- -D warnings
            language: system
            types: [rust]
            pass_filenames: false

          # Type-checks the Python layer against the built extension.
          # Requires the extension to be installed first: uv run maturin develop
          - id: pyright
            name: pyright
            entry: uv run pyright
            language: system
            types: [python]
            pass_filenames: false
