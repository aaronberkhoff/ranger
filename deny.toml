# cargo-deny configuration — license compliance, banned crates, and advisory checks.
# See https://embarkstudios.github.io/cargo-deny/ for full reference.

[licenses]
# SPDX identifiers for licenses we accept.
# MIT OR Apache-2.0 is the standard Rust dual-license. BSL-1.0 covers some
# infrastructure crates. ISC, Unlicense, and Zlib are permissive alternatives.
allow = [
    "MIT",
    "Apache-2.0",
    "MIT OR Apache-2.0",
    "BSL-1.0",
    "ISC",
    "Unlicense",
    "Zlib",
]
# Crates with no license are a hard error — we cannot ship unlicensed code.
unlicensed = "deny"
# If cargo-deny is less than 80% confident about a licence text match, flag it.
confidence-threshold = 0.8

[bans]
# Warn (not deny) on multiple versions of the same crate — transitive deps often
# introduce version conflicts that are outside our direct control.
multiple-versions = "warn"
# Wildcard deps (version = "*") defeat reproducible builds.
wildcards = "deny"
deny = []
skip = []

[advisories]
# Known vulnerabilities are a hard error — never ship vulnerable dependencies.
vulnerability = "deny"
# Crates with known unsoundness (undefined behaviour) are also a hard error.
unsound = "deny"
# Unmaintained crates get a warning; they may not receive future security fixes.
unmaintained = "warn"
# Informational notices are surfaced as warnings, not errors.
notice = "warn"
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

[sources]
# Only allow crates published to crates.io. Add explicit entries below if you
# need git or local path dependencies.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
